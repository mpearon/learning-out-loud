<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Run Tracker - Day 5</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
    }

    .run-list {
      margin-top: 2rem;
    }

    .run-card {
      border: 1px solid #ccc;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .run-card-aside {
      width: 90%;
    }

    .run-card-aside.small {
      width: 10%;
    }

    button {
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    .invalid {
      background-color: rgba(255, 0, 0, 0.2);
    }
  </style>
</head>

<body>

  <h1>Run Tracker - Day 5</h1>

  <form id="add-run-form">
    <div>
      <label for="id">
        ID
      </label>
      <input type="text" id="id" name="id" readonly />
    </div>
    <div>
      <label for="title">
        Run Title
      </label>
      <input type="text" id="title" name="title" />
    </div>
    <div>
      <label for="date">
        Date
      </label>
      <input type="date" id="date" name="date" />
    </div>
    <select id="type" name="type">
      <option value="race">Race</option>
      <option value="training">Training</option>
    </select>
    <div>
      <label for="distance">
        Distance (mi)
      </label>
      <input type="number" id="distance" name="distance" step="0.1" />
    </div>
    <div>
      <label for="duration">
        Duration (min)
      </label>
      <input type="number" id="duration" name="duration" />
    </div>
    <button type="submit">
      Add Run
    </button>

  </form>
  <button id="add-run-btn">
    Add Random Run
  </button>

  <div id="totalsUi" class="run-card"></div>

  <br />

  <select id="filter-runs">
    <option value="all" selected>All Runs</option>
    <option value="long">Long Runs (7+ mi)</option>
    <option value="thisYear">This Year</option>
    <option value="thisMonth">This Month</option>
  </select>
  <select id="sort-runs">
    <option value="date" selected>Date</option>
    <option value="title">Title</option>
    <option value="distance">Distance</option>
    <option value="duration">Duration</option>
  </select>
  <button id="apply-render-options">
    Apply
  </button>
  <button id="clear-all-runs">
    Clear Runs
  </button>

  <div id="run-list" class="run-list"></div>

  <script src="script-day5.js"></script>

</body>

</html>
